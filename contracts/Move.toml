[package]
name = "reflux"
edition = "2024"
version = "0.1.0"
published-at = "0xee23c4aecc3ab750c2c62ca5861b4fc517f577b0f219d80fa25a42d838a09bea"

[dependencies]
# dUSDC: DeepBook synthetic stable — interface skeleton mirroring deepbookv3/packages/dusdc
#        (published-at 0xe95040... matches the deployed testnet package)
dusdc = { local = "deps/dusdc" }
# dBTC: NOT yet deployed on testnet. Skeleton ready at deps/dbtc — uncomment + fill address below
#       once MystenLabs publishes deepbookv3/packages/dbtc.
# dbtc  = { local = "deps/dbtc" }
# USDC: Circle canonical testnet USDC — skeleton + its transitive deps
usdc                 = { local = "deps/usdc" }
usdc_upgrade_service = { local = "deps/usdc_upgrade_service" }  # 0x252b1dd4 — Circle upgrade-service
usdc_stablecoin      = { local = "deps/usdc_stablecoin" }       # 0x346e3233 — Circle stablecoin logic
# afSUI: Aftermath Finance testnet LSD — skeleton with correct published-at
afsui = { local = "deps/afsui" }

# OpenZeppelin Contracts for Sui — access control, rate limiting, checked math.
# Vendored as local source (see contracts/deps/openzeppelin_*/Move.toml for the
# pinned upstream commit) because the build environment has no MVR/network
# access. Once available, swap each line below for:
#   openzeppelin_access = { r.mvr = "@openzeppelin-move/access" }
#   openzeppelin_utils  = { r.mvr = "@openzeppelin-move/utils" }
#   openzeppelin_math   = { r.mvr = "@openzeppelin-move/integer-math" }
openzeppelin_access = { local = "deps/openzeppelin_access" }
openzeppelin_utils  = { local = "deps/openzeppelin_utils" }
openzeppelin_math   = { local = "deps/openzeppelin_math" }

# --- External protocol dependencies (future phases) -----------------------
# DeepBook Predict — branch predict-testnet-4-16 (NOT main):
# predict = { git = "https://github.com/MystenLabs/deepbookv3.git", subdir = "packages/predict", rev = "predict-testnet-4-16" }
# deepbook = { git = "https://github.com/MystenLabs/deepbookv3.git", subdir = "packages/deepbook", rev = "predict-testnet-4-16" }
# deepbook_margin = { git = "https://github.com/MystenLabs/deepbookv3.git", subdir = "packages/deepbook_margin", rev = "predict-testnet-4-16" }

[addresses]
reflux = "0xee23c4aecc3ab750c2c62ca5861b4fc517f577b0f219d80fa25a42d838a09bea"
# Override to testnet deployed addresses (packages use "0x0" as placeholder)
dusdc                = "0xe95040085976bfd54a1a07225cd46c8a2b4e8e2b6732f140a0fc49850ba73e1a"
usdc                 = "0xa1ec7fc00a6f40db9693ad1415d0c193ad3906494428cf252621037bd7117e29"
afsui                = "0x5783fa2298e7301a1c7f99ce45d4a207478fbf3003eca9482ae823d6f6c7cd60"
usdc_upgrade_service = "0x252b1dd4b853d6b4c0721cf3f55c0587c940ee4d386d1b1cb5f46fa16e3de98a"
usdc_stablecoin      = "0x346e3233f61eb0055713417bfaddda7dc3bf26816faad1f7606994a368b92917"
