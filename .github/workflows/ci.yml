name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  move:
    name: Move build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Sui CLI
        run: |
          curl -fsSL "https://github.com/MystenLabs/sui/releases/download/testnet-v1.73.0/sui-testnet-v1.73.0-ubuntu-x86_64.tgz" -o sui.tgz
          mkdir -p "$HOME/.local/bin"
          tar -xzf sui.tgz -C "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: sui move test
        working-directory: contracts
        run: sui move test
